let respostas = {};

const app = document.getElementById('quizApp');

function isImpactful(v){ return v==='identifico'||v==='prejudica'; }

function getTotalMarked(){
  let t=0;
  CHAKRAS.forEach(c=>c.blocos.forEach(b=>{ if(isImpactful(respostas[c.id+'_'+b.id])) t++; }));
  return t;
}

function chakraMarked(idx){
  const c=CHAKRAS[idx];
  return c.blocos.filter(b=>isImpactful(respostas[c.id+'_'+b.id])).length;
}

function chakraAnsweredCount(idx){
  const c=CHAKRAS[idx];
  return c.blocos.filter(b=>respostas[c.id+'_'+b.id]).length;
}

function chakraComplete(idx){
  const c=CHAKRAS[idx];
  return c.blocos.every(b=>respostas[c.id+'_'+b.id]);
}

function allChakrasComplete(){
  return CHAKRAS.every((_,i)=>chakraComplete(i));
}

function getChakraData(chakra){
  const marcados=chakra.blocos.filter(b=>isImpactful(respostas[chakra.id+'_'+b.id]));
  const prejudicam=chakra.blocos.filter(b=>respostas[chakra.id+'_'+b.id]==='prejudica');
  const identificam=chakra.blocos.filter(b=>respostas[chakra.id+'_'+b.id]==='identifico');
  const resVal=respostas[chakra.id+'_resultado']||null;
  const resPrioridade=!!respostas[chakra.id+'_resultado_prioridade'];
  const total=chakra.blocos.length;
  let deseqLevel=marcados.length/total;
  if(prejudicam.length>0) deseqLevel=Math.min(deseqLevel+(prejudicam.length/total)*0.3,1);
  let deseqStatus='Balanced',deseqColor='#22c55e';
  if(prejudicam.length>=2){deseqStatus='Critical';deseqColor='#ef4444';}
  else if(marcados.length>=4||prejudicam.length>=1){deseqStatus='Imbalanced';deseqColor='#f97316';}
  else if(marcados.length>=2){deseqStatus='Mild Attention';deseqColor='#eab308';}
  let resStatus='—',resColor='#6b7280';
  if(resVal==='alto'){resStatus='Strong';resColor='#22c55e';}
  else if(resVal==='medio'){resStatus='Partial';resColor='#eab308';}
  else if(resVal==='baixo'){resStatus='Weak';resColor='#ef4444';}
  return{marcados,prejudicam,identificam,resVal,resPrioridade,deseqLevel,deseqStatus,deseqColor,resStatus,resColor};
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  h+='</div></div>';

  h+='</div>';

  const currentComplete=chakraComplete(currentChakra);

  let h='<div class="mapa-header"><div class="mapa-icon">🪷</div><h2>Your Energy Map</h2><p>Overview of the 7 chakras</p></div>';

  const allPrejudica=[];
  const resPrioridades=[];
  const gapChakras=[];

  h+='<div class="mapa-chakras">';
  CHAKRAS.forEach(c=>{
    const d=getChakraData(c);
    c.blocos.forEach(b=>{ if(respostas[c.id+'_'+b.id]==='prejudica') allPrejudica.push({chakra:c,bloco:b}); });
    if(d.resPrioridade) resPrioridades.push(c);
    if(d.resVal==='baixo'&&d.marcados.length>=2) gapChakras.push({chakra:c,data:d});

    h+='<div class="mapa-row"><div class="mapa-row-header"><div class="mapa-row-title"><span class="row-emoji">'+c.emoji+'</span><span class="row-name">'+esc(c.name)+'</span></div>';
    if(d.marcados.length===0&&!d.resVal) h+='<span class="mapa-row-empty">No items marked</span>';
    h+='</div>';

    const resW=d.resVal?(d.resVal==='alto'?'100':d.resVal==='medio'?'50':'15'):'0';
    h+='<div class="mapa-meters"><div class="mapa-meter"><div class="meter-label">Imbalance</div><div class="meter-row"><div class="meter-bar-track"><div class="meter-bar-fill" style="width:'+(d.deseqLevel*100)+'%;background:'+d.deseqColor+'"></div></div><span class="meter-status" style="color:'+d.deseqColor+'">'+d.deseqStatus+'</span></div></div>';
    h+='<div class="mapa-meter"><div class="meter-label">Life Outcome</div><div class="meter-row"><div class="meter-bar-track"><div class="meter-bar-fill" style="width:'+resW+'%;background:'+d.resColor+'"></div></div><span class="meter-status" style="color:'+d.resColor+'">'+d.resStatus+'</span></div></div></div>';

    if(d.marcados.length>0||d.resVal||d.resPrioridade){
      h+='<div class="mapa-tags">';
      d.prejudicam.forEach(b=>{ h+='<span class="mapa-tag tag-prejudica">⚠ '+esc(b.tipo)+'</span>'; });
      d.identificam.forEach(b=>{ h+='<span class="mapa-tag tag-identifico">'+esc(b.tipo)+'</span>'; });
      if(d.resPrioridade) h+='<span class="mapa-tag tag-prioridade">★ Outcome is a priority</span>';
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';

  if(allPrejudica.length>0){
    h+='<div class="mapa-summary-box summary-critical"><h3>⚠ Priority imbalances</h3>';
    allPrejudica.forEach(p=>{ h+='<div class="summary-item"><span>'+p.chakra.emoji+'</span><span><strong>'+esc(p.chakra.name)+'</strong> — '+esc(p.bloco.tipo)+'</span></div>'; });
    h+='</div>';
  }

  if(resPrioridades.length>0){
    h+='<div class="mapa-summary-box summary-priority"><h3>★ Priority outcomes to improve</h3>';
    resPrioridades.forEach(c=>{
      const rv=respostas[c.id+'_resultado'];
      const lbl=rv?(rv==='alto'?'Strong':rv==='medio'?'Partial':'Weak'):'—';
      h+='<div class="summary-item"><span>'+c.emoji+'</span><span><strong>'+esc(c.name)+'</strong> — '+esc(c.resultadoPergunta)+' <span style="opacity:0.6">('+lbl+')</span></span></div>';
    });
    h+='</div>';
  }

  if(gapChakras.length>0){
    h+='<div class="mapa-summary-box summary-gaps"><h3>💡 Important gaps</h3><p>Chakras with identified imbalance and weak outcome:</p>';
    gapChakras.forEach(g=>{ h+='<div class="summary-item"><span>'+g.chakra.emoji+'</span><span><strong>'+esc(g.chakra.name)+'</strong> — Imbalance + Weak outcome</span></div>'; });
    h+='</div>';
  }

  h+='<p class="mapa-disclaimer">This map is a self-knowledge tool, not a diagnosis.</p>';
  h+='<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">';
  h+='<button class="quiz-btn-back" onclick="backToQuiz()">← Back to questionnaire</button>';
  h+='<button class="quiz-btn-download" onclick="downloadPDF()">⬇ Download Answer Key PDF</button>';
  h+='</div>';

  window.__jaResultado=CHAKRAS.map(function(c){var d=getChakraData(c);return{chakra:c.name,imbalance:d.deseqStatus,result:d.resStatus,critical:d.prejudicam.map(function(b){return b.tipo;})};});
  h+=window.jaCapturaHTML?window.jaCapturaHTML('quiz-chakras-en'):'';

  app.innerHTML=h;
}

window.downloadPDF=function(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=15;
  const cW=W-2*M;
  let y=M;

  const COLORS={
    bg:[18,18,30], surface:[30,30,48], accent:[139,92,246],
    textPrimary:[240,240,245], textSecondary:[180,180,195], textMuted:[120,120,140],
    identifico:[251,191,36], prejudica:[248,113,113],
    baixo:[248,113,113], medio:[251,191,36], alto:[74,222,128],
    green:[34,197,94], orange:[249,115,22], yellow:[234,179,8], red:[239,68,68]
  };

  function pageBg(){doc.setFillColor(...COLORS.bg);doc.rect(0,0,W,297,'F');}
  function checkPage(need){if(y+need>280){doc.addPage();pageBg();y=M;}}
  function setFont(size,style){doc.setFontSize(size);if(style==='bold')doc.setFont('helvetica','bold');else doc.setFont('helvetica','normal');}

  pageBg();

  doc.setFillColor(...COLORS.accent);
  doc.roundedRect(M,y,cW,28,3,3,'F');
  setFont(18,'bold');doc.setTextColor(255,255,255);
  doc.text('Chakra Map - Answer Key',W/2,y+12,{align:'center'});
  setFont(10,'normal');doc.setTextColor(220,220,235);
  var today=new Date();
  doc.text('Generated on '+today.toLocaleDateString('en-US')+' at '+today.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),W/2,y+20,{align:'center'});
  y+=36;

  setFont(13,'bold');doc.setTextColor(...COLORS.accent);
  doc.text('PART 1 - ANSWERS BY CHAKRA',M,y);
  y+=3;
  doc.setDrawColor(...COLORS.accent);doc.setLineWidth(0.5);doc.line(M,y,M+cW,y);
  y+=8;

  CHAKRAS.forEach(function(c){
    checkPage(50);
    var cColor;
    if(c.color==='#DC2626')cColor=[220,38,38];
    else if(c.color==='#EA580C')cColor=[234,88,12];
    else if(c.color==='#CA8A04')cColor=[202,138,4];
    else if(c.color==='#16A34A')cColor=[22,163,74];
    else if(c.color==='#2563EB')cColor=[37,99,235];
    else if(c.color==='#7C3AED')cColor=[124,58,237];
    else cColor=[139,92,246];

    doc.setFillColor(...COLORS.surface);
    doc.roundedRect(M,y,cW,8,2,2,'F');
    doc.setFillColor(...cColor);doc.circle(M+5,y+4,2,'F');
    setFont(11,'bold');doc.setTextColor(...COLORS.textPrimary);
    doc.text('Chakra '+c.name,M+10,y+5.5);
    y+=12;

    var hasMark=false;
    c.blocos.forEach(function(b){
      var val=respostas[c.id+'_'+b.id];
      if(!val||val==='nao_identifico')return;
      hasMark=true;
      checkPage(18);
      var isP=val==='prejudica';
      var tagColor=isP?COLORS.prejudica:COLORS.identifico;
      var tagText=isP?'IT HURTS ME':'I IDENTIFY';

      setFont(8,'bold');doc.setTextColor(...tagColor);
      doc.text(tagText,M+4,y);
      setFont(8,'normal');doc.setTextColor(...COLORS.textMuted);
      doc.text(' - '+b.tipo,M+4+doc.getTextWidth(tagText)+1,y);
      y+=4;

      setFont(7.5,'normal');doc.setTextColor(...COLORS.textSecondary);
      b.itens.forEach(function(item){
        checkPage(5);
        var lines=doc.splitTextToSize('• '+item,cW-10);
        doc.text(lines,M+6,y);
        y+=lines.length*3.5;
      });
      y+=3;
    });

    if(!hasMark){
      setFont(8,'normal');doc.setTextColor(...COLORS.textMuted);
      doc.text('No blocks marked',M+4,y);
      y+=5;
    }

    var resVal=respostas[c.id+'_resultado'];
    var resPrio=respostas[c.id+'_resultado_prioridade'];
    if(resVal||resPrio){
      checkPage(14);
      setFont(8,'bold');doc.setTextColor(...COLORS.textMuted);
      doc.text('LIFE OUTCOME:',M+4,y);

      if(resVal){
        var rvColor=resVal==='alto'?COLORS.alto:resVal==='medio'?COLORS.medio:COLORS.baixo;
        var rvLabel=resVal==='alto'?'High':resVal==='medio'?'Medium':'Low';
        setFont(8,'bold');doc.setTextColor(...rvColor);
        doc.text(rvLabel,M+4+doc.getTextWidth('LIFE OUTCOME: ')+1,y);
      }
      y+=4;

      if(resPrio){
        setFont(7.5,'bold');doc.setTextColor(...COLORS.accent);
        doc.text('* PRIORITY TO IMPROVE',M+6,y);
        y+=4;
      }

      setFont(7.5,'normal');doc.setTextColor(...COLORS.textSecondary);
      c.resultado.forEach(function(item){
        checkPage(5);
        var lines=doc.splitTextToSize('• '+item,cW-10);
        doc.text(lines,M+6,y);
        y+=lines.length*3.5;
      });
      y+=3;
    }

    y+=4;
  });

  doc.addPage();pageBg();y=M;

  setFont(13,'bold');doc.setTextColor(...COLORS.accent);
  doc.text('PART 2 - ENERGY MAP',M,y);
  y+=3;
  doc.setDrawColor(...COLORS.accent);doc.setLineWidth(0.5);doc.line(M,y,M+cW,y);
  y+=10;

  CHAKRAS.forEach(function(c){
    checkPage(28);
    var d=getChakraData(c);

    doc.setFillColor(...COLORS.surface);
    doc.roundedRect(M,y,cW,22,2,2,'F');

    setFont(10,'bold');doc.setTextColor(...COLORS.textPrimary);
    doc.text('Chakra '+c.name,M+4,y+6);

    setFont(7.5,'bold');doc.setTextColor(...COLORS.textMuted);
    doc.text('Imbalance:',M+4,y+12);
    var dc;
    if(d.deseqColor==='#22c55e')dc=COLORS.green;
    else if(d.deseqColor==='#f97316')dc=COLORS.orange;
    else if(d.deseqColor==='#eab308')dc=COLORS.yellow;
    else dc=COLORS.red;
    setFont(7.5,'bold');doc.setTextColor(...dc);
    doc.text(d.deseqStatus,M+4+doc.getTextWidth('Imbalance: ')+1,y+12);

    setFont(7.5,'bold');doc.setTextColor(...COLORS.textMuted);
    doc.text('Outcome:',M+4,y+17);
    var rc=d.resColor==='#22c55e'?COLORS.green:d.resColor==='#eab308'?COLORS.yellow:d.resColor==='#ef4444'?COLORS.red:COLORS.textMuted;
    setFont(7.5,'bold');doc.setTextColor(...rc);
    doc.text(d.resStatus,M+4+doc.getTextWidth('Outcome: ')+1,y+17);

    var tags=[];
    d.prejudicam.forEach(function(b){tags.push({t:'! '+b.tipo,c:COLORS.prejudica});});
    d.identificam.forEach(function(b){tags.push({t:b.tipo,c:COLORS.identifico});});
    if(d.resPrioridade)tags.push({t:'* Priority',c:COLORS.accent});

    if(tags.length>0){
      var tx=cW/2+M;
      setFont(6.5,'bold');
      tags.forEach(function(tag){
        checkPage(5);
        doc.setTextColor(...tag.c);
        if(tx+doc.getTextWidth(tag.t)+4>M+cW){tx=cW/2+M;y+=4;}
        doc.text(tag.t,tx,y+6);
        tx+=doc.getTextWidth(tag.t)+6;
      });
    }

    y+=26;
  });

  var allP=[];
  CHAKRAS.forEach(function(c){c.blocos.forEach(function(b){if(respostas[c.id+'_'+b.id]==='prejudica')allP.push({chakra:c,bloco:b});});});

  if(allP.length>0){
    checkPage(20);
    doc.setFillColor(60,20,20);doc.roundedRect(M,y,cW,6+allP.length*5,2,2,'F');
    setFont(9,'bold');doc.setTextColor(...COLORS.prejudica);
    doc.text('PRIORITY IMBALANCES',M+4,y+5);
    y+=9;
    setFont(7.5,'normal');doc.setTextColor(252,165,165);
    allP.forEach(function(p){
      checkPage(5);
      doc.text(p.chakra.name+' -- '+p.bloco.tipo,M+6,y);
      y+=4.5;
    });
    y+=6;
  }

  var resP=CHAKRAS.filter(function(c){return respostas[c.id+'_resultado_prioridade'];});
  if(resP.length>0){
    checkPage(20);
    doc.setFillColor(40,20,60);doc.roundedRect(M,y,cW,6+resP.length*5,2,2,'F');
    setFont(9,'bold');doc.setTextColor(...COLORS.accent);
    doc.text('PRIORITY OUTCOMES TO IMPROVE',M+4,y+5);
    y+=9;
    setFont(7.5,'normal');doc.setTextColor(196,181,253);
    resP.forEach(function(c){
      checkPage(5);
      var rv=respostas[c.id+'_resultado'];
      var lbl=rv?(rv==='alto'?'Strong':rv==='medio'?'Partial':'Weak'):'—';
      doc.text(c.name+' -- '+c.resultadoPergunta+' ('+lbl+')',M+6,y);
      y+=4.5;
    });
    y+=6;
  }

  var gaps=CHAKRAS.map(function(c){var d=getChakraData(c);if(d.resVal==='baixo'&&d.marcados.length>=2)return{chakra:c};return null;}).filter(Boolean);
  if(gaps.length>0){
    checkPage(20);
    doc.setFillColor(50,40,10);doc.roundedRect(M,y,cW,6+gaps.length*5,2,2,'F');
    setFont(9,'bold');doc.setTextColor(...COLORS.identifico);
    doc.text('IMPORTANT GAPS',M+4,y+5);
    y+=9;
    setFont(7.5,'normal');doc.setTextColor(253,224,71);
    gaps.forEach(function(g){
      checkPage(5);
      doc.text(g.chakra.name+' -- Imbalance + Weak outcome',M+6,y);
      y+=4.5;
    });
    y+=6;
  }

  checkPage(10);
  setFont(7,'normal');doc.setTextColor(...COLORS.textMuted);
  doc.text('This map is a self-knowledge tool, not a diagnosis.',W/2,y+4,{align:'center'});
  doc.text('Soul Game - jogodaalma.com',W/2,y+9,{align:'center'});

  doc.save('mapa-chakras-'+today.toISOString().slice(0,10)+'.pdf');
};

function render(){
  if(page==='final') renderFinal();
  else renderBlocos();
}

window.setBloco=function(key,val){
  respostas[key]=val;
  render();
};

window.setResultado=function(chakraId,val){
  const key=chakraId+'_resultado';
  if(!val||val==='') delete respostas[key];
  else respostas[key]=val;
  render();
};

window.togglePrioridade=function(chakraId){
  const key=chakraId+'_resultado_prioridade';
  if(respostas[key]) delete respostas[key];
  else respostas[key]=true;
  render();
};

window.goToChakra=function(idx){
  if(idx<0||idx>=CHAKRAS.length) return;
  if(idx===currentChakra+1 && !chakraComplete(currentChakra)){
    alert('Answer all blocks in this chakra before moving on.');
    return;
  }
  currentChakra=idx;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};

window.showFinal=function(){
  if(!allChakrasComplete()){
    alert('Answer all blocks in all chakras before viewing the final map.');
    return;
  }
  page='final';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};

window.backToQuiz=function(){
  page='blocos';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};

document.getElementById('navToggle').addEventListener('click',function(){
  document.getElementById('navLinks').classList.toggle('open');
});

render();
})();
</script>
